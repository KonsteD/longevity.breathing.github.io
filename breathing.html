<div class="particles" id="ptc"></div>

<div class="ov" id="ov">
    <h2>✦ Complete ✦</h2>
    <p id="ovInfo"></p>
    <button class="b b-go" id="ovBtn">OK</button>
</div>

<div class="card">
    <div class="header">
        <span class="title">Breathe</span>
        <span class="sess-time" id="sTime">05:00</span>
    </div>

    <div class="sess-bar" id="sBar"><div class="sess-bar-fill" id="sBarF"></div></div>

    <div class="breath-wrap">
        <div class="prog-track"><div class="prog-fill" id="pFill"></div></div>
        <svg class="ring-svg" viewBox="0 0 190 190">
            <circle class="ring-bg" cx="95" cy="95" r="90"/>
            <circle class="ring-fg" id="rFg" cx="95" cy="95" r="90"/>
        </svg>
        <div class="bound">
            <div class="orb" id="orb"><span class="hold-num" id="hNum">5</span></div>
        </div>
    </div>

    <div class="status">
        <div class="phase-text" id="phTxt">Press Start</div>
        <div class="sub-text" id="subTxt"></div>
    </div>

    <div class="btns">
        <button class="b b-go" id="goBtn">Start</button>
        <button class="b b-pa" id="paBtn" disabled>Pause</button>
        <button class="b b-stop" id="stBtn" disabled>Stop</button>
    </div>

    <div class="cfg-wrap">
        <div class="cfg-toggle" id="cfgT">
            <span>Settings</span><span class="arr">▼</span>
        </div>
        <div class="cfg-body" id="cfgB">
            <div class="cfg-inner">
                <div class="row">
                    <div class="row-head"><span>Breaths</span><span class="row-val" id="vB">3</span></div>
                    <input type="range" id="rB" min="1" max="10" value="3" aria-label="Number of breaths">
                </div>
                <div class="row">
                    <div class="row-head"><span>Hold (sec)</span><span class="row-val" id="vH">5</span></div>
                    <input type="range" id="rH" min="1" max="30" value="5" aria-label="Hold duration in seconds">
                </div>
                <div class="row">
                    <div class="row-head"><span>Pace (sec)</span><span class="row-val" id="vP">4</span></div>
                    <input type="range" id="rP" min="2" max="8" value="4" step="0.5" aria-label="Pace in seconds">
                </div>
                <div class="sep"></div>
                <div class="timer-row">
                    <span>Session Timer</span>
                    <label class="sw"><input type="checkbox" id="tChk" aria-label="Toggle session timer"><span class="tr"></span></label>
                </div>
                <div class="dur-wrap" id="dWrap">
                    <div class="row">
                        <div class="row-head"><span>Duration</span><span class="row-val" id="vD">5 min</span></div>
                        <input type="range" id="rD" min="1" max="60" value="5" aria-label="Session duration in minutes">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    var nB=3, hT=5, bP=4, sM=5, tOn=false;
    var run=false, psd=false, ph='idle', cB=0, cy=0;
    var pT0=0, pD=0, pE=0;
    var sT0=0, sMs=0, sEP=0, sI=null, sDone=false;
    var af=null;
    var C=2*Math.PI*90;

    var perf = window.performance || {};
    perf.now = perf.now || perf.mozNow || perf.msNow || perf.oNow || perf.webkitNow || function() { return new Date().getTime(); };
    if (!window.performance) window.performance = perf;

    var rAF = window.requestAnimationFrame || window.webkitRequestAnimationFrame || window.mozRequestAnimationFrame || function(cb) { return setTimeout(cb, 16); };
    var cAF = window.cancelAnimationFrame || window.webkitCancelAnimationFrame || window.mozCancelAnimationFrame || function(id) { clearTimeout(id); };

    function $(id) { return document.getElementById(id); }

    var orb=$('orb'), phTxt=$('phTxt'), subTxt=$('subTxt'), hNum=$('hNum');
    var rFg=$('rFg'), pFill=$('pFill');
    var goBtn=$('goBtn'), paBtn=$('paBtn'), stBtn=$('stBtn');
    var sTime=$('sTime'), sBar=$('sBar'), sBarF=$('sBarF');
    var dWrap=$('dWrap');
    var durInput=$('rD');

    goBtn.addEventListener('click', go, false);
    paBtn.addEventListener('click', pa, false);
    stBtn.addEventListener('click', st, false);
    $('ovBtn').addEventListener('click', function() { $('ov').classList.remove('show'); }, false);

    $('cfgT').addEventListener('click', function() {
        this.classList.toggle('open');
        $('cfgB').classList.toggle('open');
    }, false);

    $('tChk').addEventListener('change', tMode, false);

    function addInputListener(el, cb) {
        el.addEventListener('input', cb, false);
        el.addEventListener('change', cb, false);
    }

    addInputListener($('rB'), function(e) { nB=+e.target.value; $('vB').textContent=nB; });
    addInputListener($('rH'), function(e) { hT=+e.target.value; $('vH').textContent=hT; });
    addInputListener($('rP'), function(e) { bP=+e.target.value; $('vP').textContent=bP; });
    addInputListener(durInput, function(e) {
        sM=+e.target.value;
        $('vD').textContent = sM<60 ? sM+' min' : Math.floor(sM/60)+'h'+(sM%60?' '+sM%60+'m':'');
        if(!run) sTime.textContent=ft(sM*60);
    });

    function ft(s) {
        s = Math.max(0, Math.ceil(s));
        var m = String(Math.floor(s/60));
        var sec = String(s%60);
        while (m.length < 2) m = '0' + m;
        while (sec.length < 2) sec = '0' + sec;
        return m + ':' + sec;
    }

    function updateDurSpacing() {
        if (tOn) {
            durInput.classList.add('dur-spacing');
        } else {
            durInput.classList.remove('dur-spacing');
        }
    }

    function tMode() {
        tOn = $('tChk').checked;
        if (tOn) {
            dWrap.classList.add('open');
            sTime.classList.add('on');
            sTime.textContent = ft(sM*60);
            sTime.className = 'sess-time on';
        } else {
            dWrap.classList.remove('open');
            sTime.classList.remove('on');
            sBar.classList.remove('on');
        }
        updateDurSpacing();
    }

    function go() {
        if (run) return;
        run=true; psd=false; cy=0; pE=0; sDone=false;
        goBtn.disabled=true; paBtn.disabled=false; stBtn.disabled=false;
        $('cfgT').classList.remove('open');
        $('cfgB').classList.remove('open');
        if (tOn) {
            sMs=sM*6e4; sT0=performance.now(); sEP=0;
            sBar.classList.add('on'); sBarF.style.width='0%';
            sTime.className='sess-time on';
            startSI();
        }
        startCy();
    }

    function pa() {
        if (!run) return;
        if (!psd) {
            psd=true;
            if (af) { cAF(af); af=null; }
            pE = performance.now() - pT0;
            if (tOn) { sEP += performance.now() - sT0; clearInterval(sI); }
            orb.classList.add('dim');
            phTxt.textContent='Paused';
            phTxt.classList.add('blink');
            paBtn.textContent='Resume';
            paBtn.className='b b-res';
        } else {
            psd=false;
            pT0 = performance.now() - pE;
            if (tOn) { sT0=performance.now(); startSI(); }
            orb.classList.remove('dim');
            phTxt.classList.remove('blink');
            phTxt.textContent = ph==='inhale' ? 'Inhale' : ph==='exhale' ? 'Exhale' : 'Hold';
            paBtn.textContent='Pause';
            paBtn.className='b b-pa';
            anim();
        }
    }

    function st() {
        run=false; psd=false; ph='idle'; pE=0; sDone=false;
        if (af) { cAF(af); af=null; }
        clearInterval(sI);
        goBtn.disabled=false; paBtn.disabled=true; stBtn.disabled=true;
        paBtn.textContent='Pause';
        paBtn.className='b b-pa';
        setOrbTransform('scale(1)');
        orb.className='orb';
        phTxt.textContent='Press Start';
        phTxt.classList.remove('blink');
        subTxt.textContent='';
        hNum.classList.remove('vis');
        rFg.style.strokeDashoffset=C;
        pFill.style.width='0%';
        sBar.classList.remove('on');
        sBarF.style.width='0%';
        if (tOn) { sTime.textContent=ft(sM*60); sTime.className='sess-time on'; }
    }

    function startSI() { clearInterval(sI); sI=setInterval(updS, 200); }

    function updS() {
        if (!run || psd || !tOn) return;
        var el = sEP + (performance.now() - sT0);
        var rem = (sMs - el) / 1e3;
        sTime.textContent = ft(rem);
        sBarF.style.width = Math.min(el/sMs*100, 100) + '%';
        if (rem <= 0) {
            sTime.textContent='00:00';
            sTime.className='sess-time on done';
            clearInterval(sI);
            sDone=true;
        } else if (rem <= 10) {
            sTime.className='sess-time on crit';
        } else if (rem <= 30) {
            sTime.className='sess-time on warn';
        } else {
            sTime.className='sess-time on';
        }
    }

    function showDone() {
        $('ovInfo').textContent = cy + ' cycle' + (cy !== 1 ? 's' : '') + ' completed';
        $('ov').classList.add('show');
        st();
    }

    function startCy() {
        if (!run || psd) return;
        if (tOn && sDone) { showDone(); return; }
        cy++; subTxt.textContent='Cycle '+cy; cB=0; nxt();
    }

    function nxt() {
        if (!run || psd) return;
        cB++;
        if (cB > nB) { bHold(); } else { bIn(); }
    }

    function setOrbTransform(val) {
        orb.style.webkitTransform = val;
        orb.style.MozTransform = val;
        orb.style.msTransform = val;
        orb.style.transform = val;
    }

    function bIn() {
        if (!run || psd) return;
        ph='inhale'; pD=bP*1e3; pT0=performance.now(); pE=0;
        orb.className='orb inhale';
        phTxt.textContent='Inhale';
        subTxt.textContent='Breath '+cB+' / '+nB+'  ·  Cycle '+cy;
        hNum.classList.remove('vis');
        rFg.style.stroke='#4fc3f7';
        anim();
    }

    function bEx() {
        if (!run || psd) return;
        ph='exhale'; pD=bP*1e3; pT0=performance.now(); pE=0;
        orb.className='orb exhale';
        phTxt.textContent='Exhale';
        rFg.style.stroke='#7e57c2';
        anim();
    }

    function bHold() {
        if (!run || psd) return;
        ph='hold'; pD=hT*1e3; pT0=performance.now(); pE=0;
        orb.className='orb hold';
        setOrbTransform('scale(1.2)');
        phTxt.textContent='Hold';
        subTxt.textContent='Cycle '+cy;
        hNum.classList.add('vis');
        hNum.textContent=hT;
        rFg.style.stroke='#ffb74d';
        anim();
    }

    function anim() {
        if (!run || psd) return;
        var el = performance.now() - pT0;
        var p = Math.min(el / pD, 1);
        var tot = nB * 2 + 1;
        var dn = 0;
        if (ph === 'inhale') dn = (cB-1)*2;
        else if (ph === 'exhale') dn = (cB-1)*2+1;
        else dn = nB*2;
        pFill.style.width = ((dn+p)/tot*100) + '%';
        rFg.style.strokeDashoffset = C * (1-p);

        if (ph === 'inhale') {
            setOrbTransform('scale(' + (1 + p*1.1) + ')');
        } else if (ph === 'exhale') {
            setOrbTransform('scale(' + (2.1 - p*1.1) + ')');
        } else {
            hNum.textContent = Math.max(Math.ceil((pD-el)/1e3), 0);
            setOrbTransform('scale(' + (1.2 + Math.sin(el*.003)*.04) + ')');
        }

        if (p >= 1) {
            if (ph === 'inhale') { bEx(); }
            else if (ph === 'exhale') { nxt(); }
            else { hNum.classList.remove('vis'); pFill.style.width='0%'; startCy(); }
            return;
        }
        af = rAF(anim);
    }

    (function() {
        var c = $('ptc');
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        var count = isMobile ? 10 : 18;
        if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        for (var i = 0; i < count; i++) {
            var d = document.createElement('div');
            d.className = 'dot';
            d.style.left = Math.random()*100 + '%';
            d.style.animationDuration = (10 + Math.random()*14) + 's';
            d.style.webkitAnimationDuration = d.style.animationDuration;
            d.style.animationDelay = Math.random()*12 + 's';
            d.style.webkitAnimationDelay = d.style.animationDelay;
            var s = 2 + Math.random()*2;
            d.style.width = s + 'px';
            d.style.height = s + 'px';
            c.appendChild(d);
        }
    })();

    var hiddenProp = 'hidden', visibilityEvent = 'visibilitychange';
    if (typeof document.msHidden !== 'undefined') { hiddenProp = 'msHidden'; visibilityEvent = 'msvisibilitychange'; }
    else if (typeof document.webkitHidden !== 'undefined') { hiddenProp = 'webkitHidden'; visibilityEvent = 'webkitvisibilitychange'; }

    document.addEventListener(visibilityEvent, function() {
        if (document[hiddenProp] && run && !psd) pa();
    }, false);

    var resizeTimer;
    function handleResize() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            document.body.style.minHeight = window.innerHeight + 'px';
        }, 100);
    }
    window.addEventListener('resize', handleResize, false);
    window.addEventListener('orientationchange', function() { setTimeout(handleResize, 200); }, false);
    document.body.style.minHeight = window.innerHeight + 'px';

})();
</script>
</body>
</html>
